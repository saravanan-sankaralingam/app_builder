<svg width="286" height="260" viewBox="0 0 286 260" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg_fill" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#fcf2f9"/>
    <stop offset="100%" stop-color="#f5f5fd"/>
  </linearGradient>
  <linearGradient id="skel" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#f0c0e1"/>
    <stop offset="100%" stop-color="#cfcff3"/>
  </linearGradient>
  <linearGradient id="bdg" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#e58dc9"/>
    <stop offset="100%" stop-color="#a8a8e9"/>
  </linearGradient>
  <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#f0c0e1"/>
    <stop offset="100%" stop-color="#cfcff3"/>
  </linearGradient>
</defs>

<!-- Container -->
<rect x="36.5" y=".5" width="213" height="259" rx="15.5" fill="url(#bg_fill)" opacity=".4"/>
<rect x="36.5" y=".5" width="213" height="259" rx="15.5" fill="none" stroke="url(#bdg)" stroke-opacity=".5"/>

<!-- STATIC: Title -->
<rect x="56" y="18" width="120" height="16" rx="3" fill="url(#bdg)"/>
<!-- STATIC: Description -->
<rect x="56" y="42" width="174" height="8" rx="2" fill="url(#skel)" opacity=".8"/>
<rect x="56" y="56" width="130" height="8" rx="2" fill="url(#skel)" opacity=".8"/>
<!-- STATIC: Divider -->
<line x1="56" y1="72" x2="230" y2="72" stroke="url(#bdg)" stroke-opacity=".4" stroke-width=".8"/>

<!--
  12s cycle:
  0–8%   (0–1s)   S1 header fades in → static
  15–22% (1.8–2.6s) S1 lines grow in → static
  40–48% (4.8–5.8s) S2 header fades in → static
  55–62% (6.6–7.4s) S2 lines grow in → static
  hold all until 90%
  90–100% everything fades out together → restart
-->

<!-- S1 header -->
<rect x="56" y="86" width="88" height="14" rx="3" fill="url(#hg)">
  <animate attributeName="opacity"
    values="0;1;1;0"
    keyTimes="0;0.08;0.90;1"
    dur="9s" repeatCount="indefinite"/>
</rect>

<!-- S1 bullet 1 -->
<circle cx="62" cy="114" r="2.5" fill="url(#hg)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.15;0.21;0.90;1" dur="9s" repeatCount="indefinite"/>
</circle>
<rect x="70" y="110" width="144" height="7" rx="2" fill="url(#skel)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.15;0.21;0.90;1" dur="9s" repeatCount="indefinite"/>
  <animate attributeName="width" values="0;0;144;144;0" keyTimes="0;0.15;0.21;0.90;1" dur="9s" repeatCount="indefinite"/>
</rect>

<!-- S1 bullet 2 -->
<circle cx="62" cy="131" r="2.5" fill="url(#hg)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.22;0.28;0.90;1" dur="9s" repeatCount="indefinite"/>
</circle>
<rect x="70" y="127" width="120" height="7" rx="2" fill="url(#skel)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.22;0.28;0.90;1" dur="9s" repeatCount="indefinite"/>
  <animate attributeName="width" values="0;0;120;120;0" keyTimes="0;0.22;0.28;0.90;1" dur="9s" repeatCount="indefinite"/>
</rect>

<!-- S1 bullet 3 -->
<circle cx="62" cy="148" r="2.5" fill="url(#hg)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.29;0.35;0.90;1" dur="9s" repeatCount="indefinite"/>
</circle>
<rect x="70" y="144" width="136" height="7" rx="2" fill="url(#skel)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.29;0.35;0.90;1" dur="9s" repeatCount="indefinite"/>
  <animate attributeName="width" values="0;0;136;136;0" keyTimes="0;0.29;0.35;0.90;1" dur="9s" repeatCount="indefinite"/>
</rect>

<!-- S2 header -->
<rect x="56" y="170" width="96" height="14" rx="3" fill="url(#hg)">
  <animate attributeName="opacity"
    values="0;0;1;1;0"
    keyTimes="0;0.40;0.48;0.90;1"
    dur="9s" repeatCount="indefinite"/>
</rect>

<!-- S2 bullet 1 -->
<circle cx="62" cy="198" r="2.5" fill="url(#hg)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.55;0.61;0.90;1" dur="9s" repeatCount="indefinite"/>
</circle>
<rect x="70" y="194" width="140" height="7" rx="2" fill="url(#skel)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.55;0.61;0.90;1" dur="9s" repeatCount="indefinite"/>
  <animate attributeName="width" values="0;0;140;140;0" keyTimes="0;0.55;0.61;0.90;1" dur="9s" repeatCount="indefinite"/>
</rect>

<!-- S2 bullet 2 -->
<circle cx="62" cy="215" r="2.5" fill="url(#hg)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.62;0.68;0.90;1" dur="9s" repeatCount="indefinite"/>
</circle>
<rect x="70" y="211" width="116" height="7" rx="2" fill="url(#skel)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.62;0.68;0.90;1" dur="9s" repeatCount="indefinite"/>
  <animate attributeName="width" values="0;0;116;116;0" keyTimes="0;0.62;0.68;0.90;1" dur="9s" repeatCount="indefinite"/>
</rect>

<!-- S2 bullet 3 -->
<circle cx="62" cy="232" r="2.5" fill="url(#hg)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.69;0.75;0.90;1" dur="9s" repeatCount="indefinite"/>
</circle>
<rect x="70" y="228" width="128" height="7" rx="2" fill="url(#skel)">
  <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.69;0.75;0.90;1" dur="9s" repeatCount="indefinite"/>
  <animate attributeName="width" values="0;0;128;128;0" keyTimes="0;0.69;0.75;0.90;1" dur="9s" repeatCount="indefinite"/>
</rect>

</svg>
